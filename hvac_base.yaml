esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}
  min_version: 2024.11.0
  name_add_mac_suffix: false

esp8266:
  board: huzzah

uart:
  id: HP_UART
  baud_rate: 2400
  tx_pin: 1
  rx_pin: 3

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

# Default logging level
logger:
  hardware_uart: UART1 # Uncomment on ESP8266 devices
  level: INFO

substitutions:
  my_ssid: !secret wifi_ssid
  my_password: !secret  wifi_password

status_led:
  pin:
    number: GPIO2
    inverted: true

wifi:
  ssid: "${my_ssid}"
  password: "${my_password}"
  min_auth_mode: WPA2

# External component reference
external_components:
  - source: github://echavet/MitsubishiCN105ESPHome

sensor:
  - platform: uptime
    name: Uptime

# Climate entity configuration
climate:
  - platform: cn105
    id: hp
    name: None
    icon: mdi:air-conditioner
    visual:
      min_temperature: 13 # Adjust to your unit's min temp. SmartSet units can go to 10C for heating
      max_temperature: 33
      temperature_step:
        target_temperature: 1
        current_temperature: 0.5
    fahrenheit_compatibility: "standard"
    # Timeout and communication settings
    remote_temperature_timeout: 30min
    update_interval: 5s
    debounce_delay : 100ms
    # Various optional sensors, not all sensors are supported by all heatpumps
    compressor_frequency_sensor:
      name: Compressor Frequency
      entity_category: diagnostic
      disabled_by_default: true
    outside_air_temperature_sensor:
      name: Outside Air Temp
      disabled_by_default: false
    vertical_vane_select:
      name: Vertical Vane
      disabled_by_default: true
    horizontal_vane_select:
      name: Horizontal Vane
      disabled_by_default: false
    isee_sensor:
      name: ISEE Sensor
      disabled_by_default: true
    stage_sensor:
      name: Stage
      entity_category: diagnostic
      disabled_by_default: false
    sub_mode_sensor:
      name: Sub Mode
      entity_category: diagnostic
      disabled_by_default: true
    auto_sub_mode_sensor:
      name: Auto Sub Mode
      entity_category: diagnostic
      disabled_by_default: false
    input_power_sensor:
      name: Input Power
      disabled_by_default: false
    kwh_sensor:
      name: Energy Usage
      disabled_by_default: false
    runtime_hours_sensor:
      name: Runtime Hours
      entity_category: diagnostic
      disabled_by_default: false
    hardware_settings:
      update_interval: 20s
      list:
        # Code 101: Auto Restart
        - code: 101
          name: "Auto Restart after Power Failure"
          icon: "mdi:restart"
          options:
            1: "ON (Default)"
            2: "OFF"

        # Code 102: Temperature Sensing Source
        # Important for remote temperature control!
        - code: 102
          name: "Temperature Source"
          icon: "mdi:thermometer-check"
          options:
            1: "Indoor Unit (Default)"
            2: "Remote Controller"
            3: "External (CN105/WiFi)"

        # Code 103: Ventilation / Lossnay interaction
        - code: 103
          name: "Ventilation Link"
          options:
            1: "None (Default)"
            2: "With Lossnay"
            3: "Forced"

        # Code 105: Auto Energy Saving
        - code: 105
          name: "Auto Energy Saving"
          options:
            1: "ON (Default)"
            2: "OFF"

        # Code 107: Filter Sign Interval
        - code: 107
          name: "Filter Sign Interval"
          icon: "mdi:air-filter"
          options:
            1: "100 Hours (Default)"
            2: "2500 Hours"
            3: "No Indication"

        # Code 108: Ceiling Height / Static Pressure
        - code: 108
          name: "Ceiling Height Mode"
          icon: "mdi:arrow-expand-vertical"
          options:
            1: "Standard (Default)"
            2: "High Ceiling"
            3: "Low Ceiling"

        # Code 109: Number of Air Outlets (Cassette models only)
        - code: 109
          name: "Air Outlets"
          options:
            1: "4 Directions (Default)"
            2: "3 Directions"
            3: "2 Directions"

        # Code 110: Auto Mode Switching Logic
        - code: 110
          name: "Auto Mode Logic"
          icon: "mdi:sync"
          options:
            1: "Energy Saving (Default)"
            2: "Comfort / Performance"

        # Code 111: Vane Setting (for specific models)
        - code: 111
          name: "Vane Geometry"
          options:
            1: "Standard (Default)"
            2: "Type 1"
            3: "Type 2"

        # Code 117: Defrost Control
        - code: 117
          name: "Defrost Logic"
          icon: "mdi:snowflake-melt"
          options:
            1: "Standard (Default)"
            2: "High Humidity / Frequent"

        # Code 124: Heating Temperature Offset
        - code: 124
          name: "Heating Offset (+2°C)"
          options:
            1: "ON (Default)"
            2: "OFF"

        # Code 125: Fan behavior during Thermo-OFF (Heating)
        - code: 125
          name: "Fan during Thermo-OFF (Heat)"
          icon: "mdi:fan-off"
          options:
            1: "Extra Low (Default)"
            2: "Stop"
            3: "Set Speed"

        # Code 127: Fan behavior during Thermo-OFF (Cooling)
        - code: 127
          name: "Fan during Thermo-OFF (Cool)"
          icon: "mdi:fan-off"
          options:
            1: "Set Speed (Default)"
            2: "Stop"

        # Code 128: System Error Display
        - code: 128
          name: "Error Display on Remote"
          options:
            1: "ON (Default)"
            2: "OFF"
